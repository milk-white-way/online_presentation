<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320">
  <!--
    Oblique projection:
      px(x,y,z) = 100 + x*260 + z*140
      py(x,y,z) = 290 - y*150 - z*75

    Box corners:
      fbl(100,290)  fbr(360,290)  ftr(360,140)  ftl(100,140)
      bbl(240,215)  bbr(500,215)  btr(500, 65)  btl(240, 65)
  -->
  <style>
    .edge         { stroke: #222222; }
    .hidden-edge  { stroke: #888888; }
    .axis-line    { stroke: #444444; }
    .axis-text    { fill: #444444; }
    .axis-arrow   { fill: #444444; }
    @media (prefers-color-scheme: dark) {
      .edge         { stroke: rgba(255,255,255,0.85); }
      .hidden-edge  { stroke: rgba(255,255,255,0.35); }
      .axis-line    { stroke: #cccccc; }
      .axis-text    { fill: #cccccc; }
      .axis-arrow   { fill: #cccccc; }
    }
  </style>

  <defs>
    <!-- axis arrowhead -->
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto">
      <path class="axis-arrow" d="M0,0.5 L5.5,3 L0,5.5 Z"/>
    </marker>
    <!-- cyan velocity arrowhead -->
    <marker id="vel-arr" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L5.5,3 L0,5.5 Z" fill="#4EC5D4"/>
    </marker>
  </defs>

  <!-- ── Axis indicator ─────────────────────────────────────── -->
  <g class="axis-line" stroke-width="1.3" fill="none">
    <line x1="50" y1="88" x2="76" y2="88" marker-end="url(#arr)"/>
    <line x1="50" y1="88" x2="50" y2="60" marker-end="url(#arr)"/>
    <line x1="50" y1="88" x2="68" y2="78" marker-end="url(#arr)"/>
  </g>
  <text class="axis-text" x="79" y="92"  font-size="12" font-family="serif">X</text>
  <text class="axis-text" x="44" y="57"  font-size="12" font-family="serif">Z</text>
  <text class="axis-text" x="70" y="76"  font-size="12" font-family="serif">Y</text>

  <!-- ── Cutting planes ─────────────────────────────────────── -->
  <!-- z = 0.5 -->
  <polygon points="170,252 430,252 430,103 170,103"
           fill="rgba(100,130,230,0.18)" stroke="#7788cc" stroke-width="1.2"/>
  <!-- x = 0.5 -->
  <polygon points="230,290 230,140 370,65 370,215"
           fill="rgba(60,190,120,0.18)" stroke="#44aa77" stroke-width="1.2"/>
  <!-- y = 0.5 -->
  <polygon points="100,215 360,215 500,140 240,140"
           fill="rgba(210,100,70,0.18)" stroke="#cc6644" stroke-width="1.2"/>

  <!-- ── Front face highlight ───────────────────────────────── -->
  <polygon points="100,140 360,140 360,290 100,290"
           fill="rgba(78,197,212,0.09)" stroke="none"/>

  <!-- ── Box: hidden edges ─────────────────────────────────── -->
  <g class="hidden-edge" stroke-width="1" stroke-dasharray="5,3" fill="none">
    <line x1="100" y1="290" x2="240" y2="215"/>
    <line x1="240" y1="215" x2="500" y2="215"/>
    <line x1="240" y1="215" x2="240" y2=" 65"/>
  </g>

  <!-- ── Box: visible edges ────────────────────────────────── -->
  <g class="edge" stroke-width="1.6" fill="none">
    <line x1="100" y1="290" x2="360" y2="290"/>
    <line x1="360" y1="290" x2="360" y2="140"/>
    <line x1="360" y1="140" x2="100" y2="140"/>
    <line x1="100" y1="140" x2="100" y2="290"/>
    <line x1="100" y1="140" x2="240" y2=" 65"/>
    <line x1="240" y1=" 65" x2="500" y2=" 65"/>
    <line x1="500" y1=" 65" x2="360" y2="140"/>
    <line x1="360" y1="290" x2="500" y2="215"/>
    <line x1="500" y1="215" x2="500" y2=" 65"/>
  </g>

  <!-- ── Moving lid: cyan top-front edge (Y⁻ face, z=1 boundary) ── -->
  <line x1="100" y1="140" x2="360" y2="140" stroke="#4EC5D4" stroke-width="2.5"/>

  <!-- ── Moving lid: velocity arrows on Y⁻ face (front face, z_proj=0)
       Front face: px(x,y,0) = 100+x*260 ; py(x,y,0) = 290-y*150
       Arrows go in +X direction at three heights (y=0.88, 0.62, 0.36) -->
  <g stroke="#4EC5D4" stroke-width="1.4" fill="none">
    <!-- y=0.88: py=158  x: 0.08→0.84 -->
    <line x1="121" y1="158" x2="318" y2="158" marker-end="url(#vel-arr)"/>
    <!-- y=0.62: py=197  x: 0.08→0.84 -->
    <line x1="121" y1="197" x2="318" y2="197" marker-end="url(#vel-arr)"/>
    <!-- y=0.36: py=236  x: 0.08→0.84 -->
    <line x1="121" y1="236" x2="318" y2="236" marker-end="url(#vel-arr)"/>
  </g>

  <!-- ── U = 1 label (right of top arrow, beside the lid edge) ── -->
  <text x="328" y="162" font-size="12" font-family="sans-serif"
        fill="#4EC5D4" font-weight="600">U = 1</text>

</svg>
